<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
  </defs>
  
  <!-- Icon -->
  <g transform="translate(10, 10)">
    <!-- Background circle -->
    <circle cx="40" cy="40" r="38" fill="url(#logoGrad)"/>
    
    <!-- Inner dark circle -->
    <circle cx="40" cy="40" r="30" fill="#1E293B"/>
    
    <!-- Log lines -->
    <g stroke="#64748B" stroke-width="2.5" stroke-linecap="round">
      <line x1="20" y1="28" x2="38" y2="28"/>
      <line x1="20" y1="40" x2="42" y2="40"/>
      <line x1="20" y1="52" x2="36" y2="52"/>
    </g>
    
    <!-- Capture arrow/snare -->
    <g stroke="#10B981" stroke-width="2.5" stroke-linecap="round" fill="none">
      <path d="M 38 28 Q 58 28, 58 40 Q 58 52, 38 52"/>
      <line x1="38" y1="28" x2="55" y2="28"/>
      <line x1="38" y1="40" x2="58" y2="40"/>
      <line x1="38" y1="52" x2="55" y2="52"/>
    </g>
    
    <!-- Capture indicator -->
    <polygon points="48,36 48,44 56,40" fill="#10B981"/>
  </g>
  
  <!-- Text -->
  <text x="105" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700">
    <tspan fill="#f8fafc">Log</tspan><tspan fill="#10B981">snare</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="107" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94a3b8" letter-spacing="1">
    K8S LOG MONITORING
  </text>
</svg>

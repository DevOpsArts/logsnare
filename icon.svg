<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="4" y="4" width="56" height="56" rx="12" fill="url(#iconGrad)"/>
  
  <!-- Inner panel -->
  <rect x="10" y="10" width="44" height="44" rx="8" fill="#1E293B"/>
  
  <!-- Log lines -->
  <g stroke="#64748B" stroke-width="3" stroke-linecap="round">
    <line x1="16" y1="22" x2="32" y2="22"/>
    <line x1="16" y1="32" x2="36" y2="32"/>
    <line x1="16" y1="42" x2="30" y2="42"/>
  </g>
  
  <!-- Snare capture effect -->
  <g stroke="#10B981" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M 32 22 Q 48 22, 48 32 Q 48 42, 32 42"/>
    <line x1="32" y1="22" x2="45" y2="22"/>
    <line x1="36" y1="32" x2="48" y2="32"/>
    <line x1="30" y1="42" x2="45" y2="42"/>
  </g>
  
  <!-- Arrow -->
  <polygon points="38,28 38,36 46,32" fill="#10B981"/>
</svg>

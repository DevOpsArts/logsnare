{{- if .Values.serviceAccount.create }}
# ServiceAccount for the monitor agent
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "logsenta.serviceAccountName" . }}
  namespace: {{ include "logsenta.namespace" . }}
  labels:
    {{- include "logsenta.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
{{- end }}
---
{{- if .Values.rbac.create }}
# ClusterRole with minimal permissions (least privilege)
# SECURITY_NOTE: Only grants read access to pods and logs
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "logsenta.fullname" . }}
  labels:
    {{- include "logsenta.labels" . | nindent 4 }}
rules:
  # Permission to list and get pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Permission to read pod logs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
---
# ClusterRoleBinding to grant permissions across all namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "logsenta.fullname" . }}
  labels:
    {{- include "logsenta.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "logsenta.serviceAccountName" . }}
    namespace: {{ include "logsenta.namespace" . }}
roleRef:
  kind: ClusterRole
  name: {{ include "logsenta.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
---
{{- if .Values.leaderElection.enabled }}
# Role for leader election (namespaced - leases)
# SECURITY_NOTE: Only grants access to leases in the logsenta namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "logsenta.fullname" . }}-leader-election
  namespace: {{ include "logsenta.namespace" . }}
  labels:
    {{- include "logsenta.labels" . | nindent 4 }}
rules:
  # Permission to manage leases for leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# RoleBinding for leader election
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "logsenta.fullname" . }}-leader-election
  namespace: {{ include "logsenta.namespace" . }}
  labels:
    {{- include "logsenta.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "logsenta.serviceAccountName" . }}
    namespace: {{ include "logsenta.namespace" . }}
roleRef:
  kind: Role
  name: {{ include "logsenta.fullname" . }}-leader-election
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}

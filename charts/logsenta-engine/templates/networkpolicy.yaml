{{- if .Values.networkPolicy.enabled }}
# Logsenta - NetworkPolicy
# SECURITY_NOTE: Restricts network access to only required destinations
# Follows principle of least privilege for network access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "logsenta.fullname" . }}
  namespace: {{ include "logsenta.namespace" . }}
  labels:
    {{- include "logsenta.labels" . | nindent 4 }}
    app.kubernetes.io/component: network-security
spec:
  podSelector:
    matchLabels:
      {{- include "logsenta.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  
  # No ingress needed - Logsenta is a monitoring agent, not a server
  ingress: []
  
  egress:
    # Allow DNS resolution (required for K8s API and database connections)
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    
    # Allow access to Kubernetes API server
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.kubeApiCidr | default "0.0.0.0/0" }}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    
    {{- if .Values.connections.mongodb.enabled }}
    # Allow MongoDB connections
    - to:
        {{- if .Values.networkPolicy.mongodb.podSelector }}
        - podSelector:
            {{- toYaml .Values.networkPolicy.mongodb.podSelector | nindent 12 }}
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.mongodb.namespace | default "database" }}
        {{- else }}
        - namespaceSelector: {}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.connections.mongodb.port | default 27017 }}
    {{- end }}
    
    {{- if .Values.connections.mysql.enabled }}
    # Allow MySQL connections
    - to:
        {{- if .Values.networkPolicy.mysql.podSelector }}
        - podSelector:
            {{- toYaml .Values.networkPolicy.mysql.podSelector | nindent 12 }}
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.mysql.namespace | default "database" }}
        {{- else }}
        - namespaceSelector: {}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.connections.mysql.port | default 3306 }}
    {{- end }}
    
    {{- if .Values.connections.postgresql.enabled }}
    # Allow PostgreSQL connections
    - to:
        {{- if .Values.networkPolicy.postgresql.podSelector }}
        - podSelector:
            {{- toYaml .Values.networkPolicy.postgresql.podSelector | nindent 12 }}
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.postgresql.namespace | default "logsenta" }}
        {{- else }}
        - namespaceSelector: {}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.connections.postgresql.port | default 5432 }}
    {{- end }}
    
    {{- if .Values.connections.influxdb.enabled }}
    # Allow InfluxDB connections
    - to:
        {{- if .Values.networkPolicy.influxdb.podSelector }}
        - podSelector:
            {{- toYaml .Values.networkPolicy.influxdb.podSelector | nindent 12 }}
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.influxdb.namespace | default "database" }}
        {{- else }}
        - namespaceSelector: {}
        {{- end }}
      ports:
        - protocol: TCP
          port: 8086
    {{- end }}
    
    {{- if .Values.connections.elasticsearch.enabled }}
    # Allow Elasticsearch/OpenSearch connections
    - to:
        {{- if .Values.networkPolicy.elasticsearch.podSelector }}
        - podSelector:
            {{- toYaml .Values.networkPolicy.elasticsearch.podSelector | nindent 12 }}
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.elasticsearch.namespace | default "logsenta" }}
        {{- else }}
        - namespaceSelector: {}
        {{- end }}
      ports:
        - protocol: TCP
          port: 9200
        - protocol: TCP
          port: 9300
    {{- end }}
{{- end }}

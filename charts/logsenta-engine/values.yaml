# Logsenta-Engine Helm Chart Values
# ==================================

# Namespace configuration
namespace:
  create: true
  name: logsenta

# Image configuration
# NOTE: If tag is empty, defaults to Chart.AppVersion (currently 0.4.2)
image:
  repository: devopsart1/logsenta-engine
  tag: ""  # Empty = uses appVersion from Chart.yaml
  pullPolicy: IfNotPresent

# Replica count
replicaCount: 1

# Service account configuration
serviceAccount:
  create: true
  name: logsenta-engine

# RBAC configuration
rbac:
  create: true

# =============================================================================
# Leader Election Configuration (for High Availability)
# =============================================================================
# Enable when running multiple replicas to prevent duplicate log capture
leaderElection:
  enabled: false
  # Name of the Lease object used for leader election
  leaseName: "logsenta-engine-leader"
  # How long the lease is valid (seconds)
  leaseDurationSeconds: 15
  # How long to try renewing before giving up (seconds)
  renewDeadlineSeconds: 10
  # How often to retry acquiring the lease (seconds)
  retryPeriodSeconds: 2

# Resource limits and requests
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

# =============================================================================
# Scalability Configuration (for 100+ pods)
# =============================================================================
scalability:
  # Maximum concurrent pod monitors (ThreadPoolExecutor workers)
  # Increase for more pods, but watch memory usage
  maxWorkerThreads: 20
  
  # Log buffer size per pod (lines to keep in memory)
  # Lower = less memory, higher = more context before errors
  logBufferSize: 5000
  
  # Batch queue size for storage writes
  batchQueueSize: 1000
  
  # Seconds between batch flushes to storage
  batchFlushInterval: 5
  
  # Rate limiting per pod (prevents DoS from chatty pods)
  rateLimitPerPod: 1000    # logs per second
  rateBurstPerPod: 5000    # burst capacity

# Security context for pod
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Security context for container
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# =============================================================================
# Storage Configuration
# =============================================================================
# Log storage type: file, mongodb, mysql, postgresql, influxdb, elasticsearch, azure, gcp, aws
# Setting the type automatically enables the corresponding connection configuration.
# Configure credentials in the connections.<backend> section below.
storage:
  # Enable/disable storage backend. When disabled, Logsenta only monitors and alerts.
  # Useful for "monitor + alert only" mode without persisting logs to storage.
  enabled: true
  type: "postgresql"
  # Output directory for file storage (uses emptyDir)
  outputDir: "/logs"
  # EmptyDir size limit (optional)
  emptyDirSizeLimit: "1Gi"

# =============================================================================
# Capture Window Configuration
# =============================================================================
# Controls how many minutes of logs are captured before and after an error
captureWindow:
  # Minutes of logs to capture BEFORE error is detected (rolling buffer)
  bufferDurationMinutes: 2
  # Minutes of logs to capture AFTER error is detected
  captureAfterMinutes: 2

# =============================================================================
# Capture Mode Configuration
# =============================================================================
# Choose between capturing only error logs or all logs
captureMode:
  # When true, captures ALL logs regardless of error patterns
  # When false (default), only captures logs around detected error patterns
  captureAllLogs: false
  # Batch size for capture-all mode (how many log lines before saving to DB)
  batchSize: 100
  # Batch timeout in seconds (force save after this many seconds even if batch not full)
  batchTimeoutSeconds: 60

# =============================================================================
# Connection Configuration - Secrets will be created from these values
# =============================================================================
# SECURITY_NOTE: In production, consider using external secret management
# (HashiCorp Vault, AWS Secrets Manager, etc.) instead of storing in values.yaml

connections:
  # MongoDB connection configuration
  mongodb:
    enabled: false
    host: "mongodb.database.svc.cluster.local"
    port: "27017"
    database: "k8s_logs"
    collection: "error_logs"
    authSource: "admin"
    # REPLACE_ME: Set actual credentials
    username: ""
    password: ""
    # SSL/TLS Configuration
    ssl:
      enabled: false
      # Path to CA certificate (mounted from secret)
      caCert: ""
      # Path to client certificate (for mutual TLS)
      clientCert: ""
      # Path to client key (for mutual TLS)
      clientKey: ""
      # Allow invalid certificates (NOT recommended for production)
      allowInvalidCertificates: false
      # Allow invalid hostnames (NOT recommended for production)
      allowInvalidHostnames: false

  # MySQL connection configuration
  # NOTE: Set storage.type=mysql to use MySQL backend. Connection is auto-enabled.
  # The 'enabled' flag can be used to explicitly control config injection.
  mysql:
    enabled: false
    host: "mysql.logsenta.svc.cluster.local"
    port: 3306
    database: "k8s_logs"
    table: "error_logs"
    # SECURITY: Set credentials via --set or external secrets
    username: ""
    password: ""
    # SSL/TLS Configuration
    ssl:
      enabled: false
      # Path to CA certificate
      caCert: ""
      # Path to client certificate (for mutual TLS)
      clientCert: ""
      # Path to client key (for mutual TLS)
      clientKey: ""
      # Verify server certificate (recommended: true)
      verifyCert: true
      # Verify server identity (recommended: true)
      verifyIdentity: true

  # PostgreSQL connection configuration
  # NOTE: Set storage.type=postgresql to use PostgreSQL backend. Connection is auto-enabled.
  # The 'enabled' flag can be used to explicitly control config injection.
  postgresql:
    enabled: true
    host: "postgresql.logsenta.svc.cluster.local"
    port: 5432
    database: "k8s_logs"
    table: "error_logs"
    # SECURITY: Set credentials via --set or external secrets
    username: ""
    password: ""
    # SSL/TLS Configuration
    ssl:
      enabled: false
      # SSL mode: disable, allow, prefer, require, verify-ca, verify-full
      # - disable: No SSL
      # - allow: Try non-SSL, then SSL
      # - prefer: Try SSL, then non-SSL (default)
      # - require: SSL required, no certificate verification
      # - verify-ca: SSL required, verify CA
      # - verify-full: SSL required, verify CA and hostname
      mode: "prefer"
      # Path to CA certificate (required for verify-ca, verify-full)
      caCert: ""
      # Path to client certificate (for mutual TLS)
      clientCert: ""
      # Path to client key (for mutual TLS)
      clientKey: ""

  # InfluxDB connection configuration
  influxdb:
    enabled: false
    url: "http://influxdb.database.svc.cluster.local:8086"
    org: "default"
    bucket: "k8s_logs"
    # REPLACE_ME: Set actual API token
    token: ""
    # SSL/TLS Configuration
    ssl:
      enabled: false
      # Verify SSL certificates (recommended: true)
      verifyCerts: true
      # Path to CA certificate
      caCert: ""
      # Path to client certificate (for mutual TLS)
      clientCert: ""
      # Path to client key (for mutual TLS)
      clientKey: ""

  # Elasticsearch/OpenSearch connection configuration
  elasticsearch:
    enabled: false
    hosts: "http://elasticsearch.database.svc.cluster.local:9200"
    index: "k8s-error-logs"
    # REPLACE_ME: Set actual credentials (use apiKey preferably)
    username: ""
    password: ""
    # Preferred over username/password - format: id:api_key
    apiKey: ""
    # SSL/TLS Configuration
    ssl:
      enabled: false
      # Verify SSL certificates (recommended: true)
      verifyCerts: true
      # Path to CA certificate
      caCert: ""
      # Path to client certificate (for mutual TLS)
      clientCert: ""
      # Path to client key (for mutual TLS)
      clientKey: ""

  # ==========================================================================
  # Azure Log Analytics connection configuration
  # ==========================================================================
  # Sends logs to Azure Log Analytics workspace using HTTP Data Collector API
  # Documentation: https://docs.microsoft.com/en-us/azure/azure-monitor/logs/data-collector-api
  azure:
    enabled: false
    # Azure Log Analytics Workspace ID (GUID)
    # Found in: Azure Portal > Log Analytics workspace > Agents > Workspace ID
    # REPLACE_ME: Set your workspace ID
    workspaceId: ""
    # Primary or Secondary Shared Key (Base64 encoded)
    # Found in: Azure Portal > Log Analytics workspace > Agents > Primary/Secondary key
    # REPLACE_ME: Set your shared key
    sharedKey: ""
    # Custom log type name (becomes table name with _CL suffix)
    # e.g., "LogsentaK8sLogs" creates table "LogsentaK8sLogs_CL"
    logType: "LogsentaK8sLogs"
    # Optional: Azure Resource ID for resource context
    # Format: /subscriptions/{subscription-id}/resourceGroups/{resource-group}/providers/{provider}/{resource-type}/{resource-name}
    resourceId: ""

  # ==========================================================================
  # GCP Cloud Logging connection configuration
  # ==========================================================================
  # Sends logs to Google Cloud Logging (formerly Stackdriver)
  # Documentation: https://cloud.google.com/logging/docs
  # Authentication: Prefer Workload Identity on GKE over service account keys
  gcp:
    enabled: false
    # Google Cloud Project ID (required)
    # REPLACE_ME: Set your GCP project ID
    projectId: ""
    # Log name in Cloud Logging
    # Full path: projects/{project}/logs/{logName}
    logName: "logsenta"
    # Monitored resource type for log entries
    # Options: k8s_container, k8s_pod, k8s_cluster, global
    resourceType: "k8s_container"
    # Kubernetes cluster name (for k8s resource types)
    clusterName: ""
    # Cluster location/zone (for k8s resource types)
    location: ""
    # Path to service account JSON key file (optional)
    # If not set, uses Workload Identity or Application Default Credentials
    # SECURITY_NOTE: Prefer Workload Identity over service account keys
    credentialsPath: ""
    # Service account key JSON content (if not using Workload Identity)
    # REPLACE_ME: Set service account key JSON (will be stored in K8s secret)
    serviceAccountKey: ""

  # ==========================================================================
  # AWS CloudWatch Logs connection configuration
  # ==========================================================================
  # Sends logs to Amazon CloudWatch Logs
  # Documentation: https://docs.aws.amazon.com/AmazonCloudWatch/
  # Authentication: Prefer IRSA (IAM Roles for Service Accounts) on EKS
  aws:
    enabled: false
    # AWS Region (required, e.g., us-east-1, eu-west-1)
    # REPLACE_ME: Set your AWS region
    region: ""
    # CloudWatch Log Group name (required)
    # Will be created automatically if it doesn't exist
    # REPLACE_ME: Set your log group name
    logGroup: ""
    # Log stream prefix (log streams: {prefix}/{namespace}/{pod_name})
    logStreamPrefix: "logsenta"
    # Log retention in days (default: 30)
    # Valid values: 1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653
    retentionDays: 30
    # AWS Access Key ID (optional - prefer IRSA on EKS)
    # SECURITY_NOTE: Use IRSA instead of access keys when possible
    # REPLACE_ME: Set access key if not using IRSA
    accessKeyId: ""
    # AWS Secret Access Key (optional - prefer IRSA on EKS)
    # REPLACE_ME: Set secret key if not using IRSA
    secretAccessKey: ""

# =============================================================================
# SSL Certificate Secrets (mount certificates from K8s secrets)
# =============================================================================
# Create secrets with your certificates and reference them here
# Example: kubectl create secret generic db-certs --from-file=ca.crt --from-file=client.crt --from-file=client.key
sslCertificates:
  # Enable mounting SSL certificates from secrets
  enabled: false
  # Name of the secret containing SSL certificates
  secretName: "logsenta-db-certs"
  # Mount path for certificates inside the container
  mountPath: "/certs"
  # Certificate file names in the secret (customize based on your secret)
  files:
    # Common CA certificate (used if database-specific not set)
    caCert: "ca.crt"
    # MongoDB certificates
    mongoCaCert: ""
    mongoClientCert: ""
    mongoClientKey: ""
    # MySQL certificates
    mysqlCaCert: ""
    mysqlClientCert: ""
    mysqlClientKey: ""
    # PostgreSQL certificates
    postgresqlCaCert: ""
    postgresqlClientCert: ""
    postgresqlClientKey: ""
    # InfluxDB certificates
    influxdbCaCert: ""
    influxdbClientCert: ""
    influxdbClientKey: ""
    # Elasticsearch certificates
    elasticsearchCaCert: ""
    elasticsearchClientCert: ""
    elasticsearchClientKey: ""

# =============================================================================
# Monitoring Configuration
# =============================================================================
config:
  # Namespaces to monitor
  namespaces:
    - default
    - kube-system

  # Error patterns (regex supported)
  errorPatterns:
    - "ERROR"
    - "Exception"
    - "FATAL"
    - "CRITICAL"
    - "Traceback"
    - "panic:"
    - "OOMKilled"
    - "CrashLoopBackOff"
    - "error\\s*:"
    - "failed to"
    - "unable to"
    - "HTTP/\\d\\.\\d\"\\s+5\\d{2}"
    - "at\\s+[\\w.$]+\\([\\w]+\\.java:\\d+\\)"
    - "File\\s+\"[^\"]+\",\\s+line\\s+\\d+"

  # Plain string matches (case-insensitive)
  errorStrings:
    - "NullPointerException"
    - "OutOfMemoryError"
    - "StackOverflowError"
    - "ConnectionRefused"
    - "TimeoutException"
    - "SIGKILL"
    - "SIGTERM"
    - "exit code 1"
    - "permission denied"
    - "access denied"
    - "authentication failed"
    - "authorization failed"

# =============================================================================
# Alerting Configuration
# =============================================================================
# Send alerts via email or webhooks when error patterns are detected
alerting:
  # Enable/disable alerting globally
  enabled: false
  
  # Threshold configuration - controls when alerts are triggered
  threshold:
    # Minimum number of occurrences before alerting
    count: 2
    # Time window in seconds (e.g., 300 = 5 minutes)
    # Alert only if 'count' errors occur within this window
    windowSeconds: 300
    # Cooldown period in seconds before re-alerting for the same pattern
    # Prevents alert fatigue from repeated errors
    cooldownSeconds: 600
    # Group alerts by namespace (recommended: true)
    groupByNamespace: true
    # Group alerts by pod (set true for per-pod alerting)
    groupByPod: false
  
  # ==========================================================================
  # Email Alerting Configuration
  # ==========================================================================
  email:
    enabled: false
    # SMTP server configuration
    smtpHost: "smtp.gmail.com"
    smtpPort: 587
    # Use TLS (STARTTLS) - recommended for port 587
    useTls: true
    # Use SSL - for port 465
    useSsl: false
    # SMTP credentials (use secrets in production)
    # REPLACE_ME: Set via --set or external secrets
    username: ""
    password: ""
    # Sender email address
    fromAddress: "logsenta-alerts@example.com"
    # Recipient email addresses
    toAddresses:
      - "sre-team@example.com"
      # - "oncall@example.com"
  
  # ==========================================================================
  # Webhook Alerting Configuration
  # ==========================================================================
  # Multiple webhooks can be configured (Slack, Teams, PagerDuty, generic)
  webhooks:
    # Slack webhook example
    - name: "slack"
      enabled: false
      # Webhook type: slack, teams, pagerduty, generic
      type: "slack"
      # Slack Incoming Webhook URL
      # REPLACE_ME: Set your Slack webhook URL
      url: ""
      # Request timeout in seconds
      timeout: 30
      # Verify SSL certificate
      verifySsl: true
      # Additional headers (optional)
      headers: {}
    
    # Microsoft Teams webhook example
    - name: "teams"
      enabled: false
      type: "teams"
      # Teams Incoming Webhook URL
      # REPLACE_ME: Set your Teams webhook URL
      url: ""
      timeout: 30
      verifySsl: true
      headers: {}
    
    # PagerDuty webhook example
    - name: "pagerduty"
      enabled: false
      type: "pagerduty"
      # PagerDuty Events API v2 endpoint or Integration Key
      # REPLACE_ME: Set your PagerDuty integration key
      url: "https://events.pagerduty.com/v2/enqueue"
      timeout: 30
      verifySsl: true
      headers:
        # Add routing key as header or in URL
        # X-Routing-Key: "YOUR_ROUTING_KEY"
    
    # Generic webhook example (custom endpoint)
    - name: "generic"
      enabled: false
      type: "generic"
      # Your custom webhook endpoint
      # REPLACE_ME: Set your webhook URL
      url: ""
      timeout: 30
      verifySsl: true
      # Custom headers (e.g., authentication)
      headers:
        # Authorization: "Bearer YOUR_TOKEN"
        # X-Custom-Header: "value"
  
  # ==========================================================================
  # Pattern-Based Alert Rules (Advanced)
  # ==========================================================================
  # Define custom rules to route specific error patterns to different
  # recipients with different thresholds. If rules are defined, they take
  # precedence over the global threshold/email/webhooks above.
  #
  # Each rule can have:
  # - patterns: List of regex/string patterns to match
  # - threshold: Custom threshold for this rule
  # - email: Rule-specific email recipients
  # - webhooks: List of webhook names to trigger
  # - namespaces: Limit rule to specific namespaces (optional)
  rules: []
  # Example rules configuration:
  # rules:
  #   # Critical errors - immediate PagerDuty alert
  #   - name: "critical-errors"
  #     patterns:
  #       - "CRITICAL"
  #       - "FATAL"
  #       - "OOMKilled"
  #       - "panic:"
  #     threshold:
  #       count: 1              # Alert on first occurrence
  #       windowSeconds: 60
  #       cooldownSeconds: 300
  #     email:
  #       enabled: true
  #       toAddresses:
  #         - "oncall@example.com"
  #         - "sre-critical@example.com"
  #     webhooks:
  #       - "pagerduty"
  #       - "slack"
  #   
  #   # Application exceptions - notify dev team
  #   - name: "java-exceptions"
  #     patterns:
  #       - "NullPointerException"
  #       - "IllegalArgumentException"
  #       - "at\\s+[\\w.$]+\\([\\w]+\\.java:\\d+\\)"
  #     threshold:
  #       count: 3              # Alert after 3 occurrences
  #       windowSeconds: 300    # Within 5 minutes
  #       cooldownSeconds: 600
  #     email:
  #       enabled: true
  #       toAddresses:
  #         - "java-team@example.com"
  #     webhooks:
  #       - "slack"
  #     namespaces:           # Only for these namespaces
  #       - "production"
  #       - "staging"
  #   
  #   # Python errors - notify Python team
  #   - name: "python-errors"
  #     patterns:
  #       - "Traceback"
  #       - "File\\s+\"[^\"]+\",\\s+line\\s+\\d+"
  #       - "TypeError"
  #       - "ValueError"
  #     threshold:
  #       count: 2
  #       windowSeconds: 300
  #       cooldownSeconds: 600
  #     email:
  #       enabled: true
  #       toAddresses:
  #         - "python-team@example.com"
  #     webhooks:
  #       - "teams"
  #   
  #   # Database connection errors - DBA team
  #   - name: "database-errors"
  #     patterns:
  #       - "ConnectionRefused"
  #       - "connection timeout"
  #       - "database.*unavailable"
  #       - "SQLSTATE"
  #     threshold:
  #       count: 2
  #       windowSeconds: 120    # 2 minutes
  #       cooldownSeconds: 300
  #     email:
  #       enabled: true
  #       toAddresses:
  #         - "dba-team@example.com"
  #     webhooks:
  #       - "pagerduty"

# Probes configuration
probes:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Annotations for the deployment pod
podAnnotations: {}

# Labels for the deployment pod
podLabels: {}

# =============================================================================
# Graceful Shutdown Configuration
# =============================================================================
# Time to allow for graceful shutdown (seconds)
# Should be long enough for active monitors to clean up
terminationGracePeriodSeconds: 30

# =============================================================================
# Pod Disruption Budget (for High Availability)
# =============================================================================
# Ensures minimum availability during voluntary disruptions
# Only applies when replicaCount > 1
podDisruptionBudget:
  enabled: true
  # Minimum number of pods that must be available (integer or percentage)
  minAvailable: 1
  # OR maximum number of pods that can be unavailable
  # maxUnavailable: 1

# =============================================================================
# Network Policy (Defense in Depth)
# =============================================================================
# Restricts network access to only required destinations
networkPolicy:
  enabled: false  # Enable in production for network isolation
  
  # Kubernetes API server CIDR (for pod/log watch API calls)
  # Set to your cluster's API server CIDR in production
  kubeApiCidr: "0.0.0.0/0"
  
  # Database-specific network rules (optional - for tighter restrictions)
  # If not specified, allows egress to the database port from any namespace
  mongodb:
    namespace: "database"
    # podSelector:
    #   app: mongodb
  
  mysql:
    namespace: "database"
    # podSelector:
    #   app: mysql
  
  postgresql:
    namespace: "logsenta"
    # podSelector:
    #   app: postgresql
  
  influxdb:
    namespace: "database"
    # podSelector:
    #   app: influxdb
  
  elasticsearch:
    namespace: "logsenta"
    # podSelector:
    #   app: elasticsearch
